<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="100%" height="100%">
  <defs>
    <!-- Importing Premium Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&amp;family=Fira+Code:wght@400;500&amp;display=swap');
      
      .text-title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 900;
        fill: #FFFFFF;
        font-size: 44px;
        letter-spacing: 5px;
      }
      
      .text-accent {
        fill: #9A70F5;
      }
      
      .text-subtitle {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 600;
        fill: #9A70F5;
        font-size: 16px;
        letter-spacing: 4px;
      }
      
      .text-tagline {
        font-family: 'Fira Code', monospace;
        font-weight: 400;
        fill: #8E9AA8;
        font-size: 13px;
        letter-spacing: 1px;
      }

      .wireframe-line {
        stroke: #9A70F5;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .constellation-line {
        stroke: #9A70F5;
        stroke-width: 0.8;
        stroke-dasharray: 4 4;
        opacity: 0.3;
      }

      .grid-line {
        stroke: #9A70F5;
        stroke-width: 0.6;
        opacity: 0.08;
      }

      .particle {
        fill: #9A70F5;
        opacity: 0.6;
        animation: float 4s ease-in-out infinite;
      }
    </style>

    <!-- Radial Glow Background Gradient -->
    <radialGradient id="glow" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9A70F5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#9A70F5" stop-opacity="0" />
    </radialGradient>

    <!-- Face Gradients for 3D Cubes -->
    <linearGradient id="cube-top" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BCA5FF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#9A70F5" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="cube-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A70F5" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7246D0" stop-opacity="0.5" />
    </linearGradient>

    <linearGradient id="cube-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A70F5" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4C26A4" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- Background Glow -->
  <rect width="880" height="240" fill="transparent" />
  <circle cx="680" cy="120" r="220" fill="url(#glow)" />

  <!-- Perspective Floor Grid (Minimalist 3D Space) -->
  <g>
    <!-- Vanishing Point at (680, 80) -->
    <line x1="680" y1="80" x2="-200" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="100" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="300" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="500" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="680" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="860" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="1040" y2="240" class="grid-line" />
    <line x1="680" y1="80" x2="1200" y2="240" class="grid-line" />

    <!-- Horizon/Transverse Grid Lines -->
    <line x1="0" y1="130" x2="880" y2="130" class="grid-line" />
    <line x1="0" y1="160" x2="880" y2="160" class="grid-line" />
    <line x1="0" y1="195" x2="880" y2="195" class="grid-line" />
    <line x1="0" y1="240" x2="880" y2="240" class="grid-line" />
  </g>

  <!-- Constellation Connections -->
  <g>
    <line x1="680" y1="110" x2="740" y2="70" class="constellation-line" />
    <line x1="680" y1="110" x2="620" y2="150" class="constellation-line" />
    <line x1="620" y1="150" x2="550" y2="120" class="constellation-line" />
    <line x1="740" y1="70" x2="800" y2="100" class="constellation-line" />
  </g>

  <!-- Floating Particles / Nodes -->
  <g>
    <circle cx="550" cy="120" r="3" class="particle" />
    <circle cx="800" cy="100" r="2.5" class="particle" />
    <circle cx="710" cy="180" r="2" class="particle" />
    <circle cx="600" cy="70" r="3.5" class="particle" />
  </g>

  <!-- 3D Isometric Cube 1 (Center - Large) -->
  <g transform="translate(0, 0)">
    <!-- Faces -->
    <polygon points="680,110 645,90 680,70 715,90" fill="url(#cube-top)" />
    <polygon points="680,110 645,90 645,130 680,150" fill="url(#cube-left)" />
    <polygon points="680,110 715,90 715,130 680,150" fill="url(#cube-right)" />
    <!-- Edges/Wireframe -->
    <polygon points="680,70 715,90 715,130 680,150 645,130 645,90" fill="none" class="wireframe-line" />
    <line x1="680" y1="110" x2="680" y2="150" class="wireframe-line" />
    <line x1="680" y1="110" x2="645" y2="90" class="wireframe-line" />
    <line x1="680" y1="110" x2="715" y2="90" class="wireframe-line" />
  </g>

  <!-- 3D Isometric Cube 2 (Top Right - Medium) -->
  <g transform="translate(0, 0)">
    <!-- Faces -->
    <polygon points="740,70 718,57 740,45 762,57" fill="url(#cube-top)" />
    <polygon points="740,70 718,57 718,82 740,95" fill="url(#cube-left)" />
    <polygon points="740,70 762,57 762,82 740,95" fill="url(#cube-right)" />
    <!-- Edges -->
    <polygon points="740,45 762,57 762,82 740,95 718,82 718,57" fill="none" class="wireframe-line" />
    <line x1="740" y1="70" x2="740" y2="95" class="wireframe-line" />
    <line x1="740" y1="70" x2="718" y2="57" class="wireframe-line" />
    <line x1="740" y1="70" x2="762" y2="57" class="wireframe-line" />
  </g>

  <!-- 3D Isometric Cube 3 (Bottom Left - Small) -->
  <g transform="translate(0, 0)">
    <!-- Faces -->
    <polygon points="620,150 603,140 620,130 637,140" fill="url(#cube-top)" />
    <polygon points="620,150 603,140 603,160 620,170" fill="url(#cube-left)" />
    <polygon points="620,150 637,140 637,160 620,170" fill="url(#cube-right)" />
    <!-- Edges -->
    <polygon points="620,130 637,140 637,160 620,170 603,160 603,140" fill="none" class="wireframe-line" />
    <line x1="620" y1="150" x2="620" y2="170" class="wireframe-line" />
    <line x1="620" y1="150" x2="603" y2="140" class="wireframe-line" />
    <line x1="620" y1="150" x2="637" y2="140" class="wireframe-line" />
  </g>

  <!-- Typography / Info Left Side -->
  <text x="60" y="95" class="text-title">NISHANT <tspan class="text-accent">KUMAR</tspan></text>
  <text x="60" y="132" class="text-subtitle">FRONTEND DEV | AI/ML | 3D MODELLING</text>
  <text x="60" y="168" class="text-tagline">System.out.println("Always building &amp; optimizing.");</text>
</svg>
